name: Deploy to Cloud Run
on:
  push:
    branches:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/107792158291/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deploy@107792158291.iam.gserviceaccount.com'
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: voice-concierge
          source:.
          region: us-central1
          flags: '--allow-unauthenticated --memory=1Gi --min-instances=1'
          env_vars: |
            GCP_PROJECT=107792158291
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
